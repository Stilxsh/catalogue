  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --accent: #3b82f6;
      --dark: #0f172a;
      --slate: #64748b;
      --light: #f8fafc;
      --white: #ffffff;
      --radius: 20px;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    /* Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--light);
      color: var(--dark);
      line-height: 1.5;
      padding-bottom: 100px; /* Space for mobile nav */
    }

    /* --- HEADER --- */
    header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      padding: 1.5rem 1rem;
      text-align: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .brand-logo { height: 60px; width: auto; margin-bottom: 10px; }
    header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; text-transform: uppercase; }
    .contact-info { font-size: 0.8rem; color: var(--slate); margin-top: 4px; }

    /* --- CONTROLS --- */
    .controls { max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; }
    .search-wrapper { position: relative; margin-bottom: 1.5rem; }
    .search-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--slate); }
    .search-input {
      width: 100%; padding: 16px 16px 16px 50px; border-radius: 16px;
      border: 1px solid #e2e8f0; font-size: 1rem; font-weight: 600;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); outline: none; transition: 0.3s;
    }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }

    .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-pill {
      padding: 10px 22px; border-radius: 50px; background: var(--white);
      border: 1px solid #e2e8f0; cursor: pointer; white-space: nowrap;
      font-weight: 700; color: var(--slate); transition: 0.2s;
    }
    .filter-pill.active { background: var(--dark); color: var(--white); border-color: var(--dark); }

    /* --- PRODUCT GRID --- */
    .grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 15px; padding: 0 1rem; max-width: 1200px; margin: 0 auto;
    }
    @media (min-width: 768px) { 
      .grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; } 
    }

    .card {
      background: var(--white); border-radius: var(--radius); padding: 15px;
      border: 1px solid rgba(0,0,0,0.04); display: flex; flex-direction: column;
      position: relative; transition: transform 0.2s ease;
    }
    .card:active { transform: scale(0.97); }

    .img-hold {
      aspect-ratio: 1; background: #fcfcfc; border-radius: 15px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
    }
    .img-hold img { max-width: 85%; max-height: 85%; object-fit: contain; }

    .status-badge {
      position: absolute; top: 22px; left: 22px; font-size: 0.65rem;
      font-weight: 800; padding: 4px 10px; border-radius: 6px; color: white; text-transform: uppercase;
    }
    .status-oos { background: #ef4444; }
    .status-low { background: #f59e0b; }

    .card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; height: 2.5em; overflow: hidden; line-height: 1.3; }
    .price-tag { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
    .pack-info { font-size: 0.75rem; color: var(--slate); margin-bottom: 12px; font-weight: 600; }

    .btn-add {
      width: 100%; padding: 12px; border-radius: 12px; border: none;
      background: var(--dark); color: white; font-weight: 700; cursor: pointer;
      transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-add.added { background: var(--primary); }
    .btn-add:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }

    /* --- QUOTE DRAWER --- */
    #sidebar {
      position: fixed; top: 0; right: -100%; width: 100%; max-width: 420px;
      height: 100%; background: var(--white); z-index: 2000;
      box-shadow: -10px 0 40px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
    }
    #sidebar.open { right: 0; }

    .side-head { padding: 24px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .side-body { flex: 1; overflow-y: auto; padding: 20px; }
    
    .q-item {
      display: flex; gap: 15px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9;
    }
    .q-item img { width: 60px; height: 60px; object-fit: contain; background: #f8fafc; border-radius: 10px; }
    .q-info { flex: 1; }
    .q-info h4 { font-size: 0.9rem; margin-bottom: 8px; font-weight: 700; }
    
    .qty-controls { display: flex; align-items: center; gap: 12px; }
    .qty-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-weight: 800; cursor: pointer; }
    
    .side-foot { padding: 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
    
    .delivery-box { margin-bottom: 20px; }
    .delivery-box label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--slate); margin-bottom: 8px; text-transform: uppercase; }
    .delivery-box input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: inherit; }

    .btn-whatsapp {
      width: 100%; padding: 18px; background: #25d366; color: white; border: none;
      border-radius: 16px; font-weight: 800; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
    }

    .template-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    .btn-sub { background: white; border: 1px solid #e2e8f0; padding: 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; color: var(--slate); cursor: pointer; }

    /* --- MOBILE NAV --- */
    .mobile-nav {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: var(--white); display: flex; justify-content: space-around;
      padding: 12px 0; border-top: 1px solid #f1f5f9; z-index: 1000;
    }
    .nav-link { background: none; border: none; color: #94a3b8; font-size: 0.7rem; font-weight: 700; text-align: center; position: relative; cursor: pointer; }
    .nav-link i { display: block; font-size: 1.3rem; margin-bottom: 4px; }
    .nav-link.active { color: var(--primary); }
    .cart-badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 10px; min-width: 18px; padding: 2px 4px; border-radius: 10px; border: 2px solid white; }

    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; z-index: 1500; }
    #overlay.active { display: block; }

    /* --- PRINT OPTIMIZATION --- */
    @media print {
      .mobile-nav, .controls, .btn-add, .side-foot, .qty-btn, .status-badge { display: none !important; }
      #sidebar { position: static; width: 100%; box-shadow: none; display: block; }
      .grid { display: block; }
      .card { border: none; border-bottom: 1px solid #eee; flex-direction: row; gap: 20px; page-break-inside: avoid; }
      .img-hold { width: 100px; height: 100px; }
    }
  </style>
</head>

<div id="overlay" onclick="app.toggleSidebar()"></div>
<div id="sidebar">

    <h3>Your Quote Request</h3>

  </div>
  
  <div class="side-body" id="quoteList">
    </div>

  <div class="side-foot">

      <input type="date" id="deliveryDate">
    </div>
    
    <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:800; font-size:1.1rem;">
      <span>Estimated Total</span>
      <span id="totalPrice">£0.00</span>
    </div>

    <button class="btn-whatsapp" onclick="app.sendWhatsApp()">
      <i class="fab fa-whatsapp"></i> Send Quote Request
    </button>

    <div class="template-btns">
      <button class="btn-sub" onclick="app.saveTemplate()"><i class="fas fa-save"></i> Save Reorder</button>
      <button class="btn-sub" onclick="app.loadTemplate()"><i class="fas fa-history"></i> Load Saved</button>
    </div>
  </div>
</div>

<nav class="mobile-nav">
  <button class="nav-link active" onclick="window.scrollTo({top:0, behavior:'smooth'})">
    <i class="fas fa-th-large"></i>Catalogue
  </button>

  <button class="nav-link" onclick="window.print()">
    <i class="fas fa-file-pdf"></i>PDF

</nav>

  const app = {
    quote: JSON.parse(localStorage.getItem('currentQuote')) || [],
    filter: 'all',

    init() {
      this.render();
      this.updateUI();
    },

    setFilter(cat, btn) {
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      this.filter = cat;
      this.render();
    },

    render() {
      const grid = document.getElementById('mainGrid');
      const query = document.getElementById('search').value.toLowerCase();
      
      const filtered = products.filter(p => {
        const matchesCat = (this.filter === 'all' || p.cat === this.filter);
        const matchesSearch = p.name.toLowerCase().includes(query);
        return matchesCat && matchesSearch;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; color:var(--slate);">
          <i class="fas fa-search fa-3x" style="opacity:0.2; margin-bottom:15px;"></i>
          <p>No products found matching your search.</p>
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const inQuote = this.quote.find(item => item.id === p.id);
        const isOOS = p.status === 'oos';
        
        return `
          <div class="card">
            ${p.status === 'oos' ? '<span class="status-badge status-oos">Out of Stock</span>' : ''}
            ${p.status === 'low-stock' ? '<span class="status-badge status-low">Limited</span>' : ''}
            <div class="img-hold">
              <img src="${p.img}" onerror="this.src='https://via.placeholder.com/200?text=Product'">
            </div>
            <div class="pack-info">${p.pack}</div>
            <h3>${p.name}</h3>
            <div class="price-tag">£${p.price.toFixed(2)}</div>
            <button class="btn-add ${inQuote ? 'added' : ''}" 
                    onclick="app.addToQuote(${p.id})" 
                    ${isOOS ? 'disabled' : ''}>
              ${isOOS ? 'Out of Stock' : (inQuote ? '<i class="fas fa-check"></i> Added' : '<i class="fas fa-plus"></i> Add to Quote')}
            </button>
          </div>
        `;
      }).join('');
    },

    addToQuote(id) {
      const existing = this.quote.find(i => i.id === id);
      if (existing) {
        this.toggleSidebar(); // If exists, just show them the list
      } else {
        const p = products.find(prod => prod.id === id);
        this.quote.push({ ...p, qty: 1 });
        this.save();
        this.render();
        this.updateUI();
      }
    },

    updateQty(id, delta) {
      const item = this.quote.find(i => i.id === id);
      if (item) {
        item.qty += delta;
        if (item.qty <= 0) this.quote = this.quote.filter(i => i.id !== id);
        this.save();
        this.updateUI();
        this.render();
      }
    },

    save() {
      localStorage.setItem('currentQuote', JSON.stringify(this.quote));
    },

    saveTemplate() {
      if (this.quote.length === 0) return alert("Add items to your quote first!");
      localStorage.setItem('wholesaleTemplate', JSON.stringify(this.quote));
      alert("Template Saved! You can load this list next time you visit.");
    },

    loadTemplate() {
      const template = localStorage.getItem('wholesaleTemplate');
      if (template) {
        this.quote = JSON.parse(template);
        this.save();
        this.updateUI();
        this.render();
        alert("Previous order loaded.");
      } else {
        alert("No saved reorder found.");
      }
    },

    updateUI() {
      const list = document.getElementById('quoteList');
      const totalCount = this.quote.reduce((sum, i) => sum + i.qty, 0);
      const totalCost = this.quote.reduce((sum, i) => sum + (i.price * i.qty), 0);
      
      document.getElementById('badgeCount').innerText = totalCount;
      document.getElementById('totalPrice').innerText = `£${totalCost.toFixed(2)}`;

      if (this.quote.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:40px; color:var(--slate);">
          <i class="fas fa-shopping-basket fa-3x" style="opacity:0.1; margin-bottom:15px;"></i>
          <p>Your quote request is empty.</p>
        </div>`;
      } else {
        list.innerHTML = this.quote.map(item => `
          <div class="q-item">
            <img src="${item.img}" onerror="this.src='https://via.placeholder.com/60'">
            <div class="q-info">
              <h4>${item.name}</h4>
              <div class="qty-controls">
                <button class="qty-btn" onclick="app.updateQty(${item.id}, -1)">-</button>
                <span style="font-weight:800">${item.qty}</span>
                <button class="qty-btn" onclick="app.updateQty(${item.id}, 1)">+</button>
              </div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:800; color:var(--primary);">£${(item.price * item.qty).toFixed(2)}</div>
              <button onclick="app.updateQty(${item.id}, -1000)" style="background:none; border:none; color:#ef4444; margin-top:10px; cursor:pointer;"><i class="fas fa-trash-alt"></i></button>
            </div>
          </div>
        `).join('');
      }
    },

    toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('active');
    },

    sendWhatsApp() {
      if (this.quote.length === 0) return alert("Your quote is empty!");
      
      const phone = "447366341300";
      const deliveryDate = document.getElementById('deliveryDate').value || "ASAP";
      
      let message = `*WHOLESALE ORDER REQUEST*\n`;
      message += `Requested Date: ${deliveryDate}\n`;
      message += `--------------------------\n`;
      
      this.quote.forEach(i => {
        message += `📦 *${i.qty}x* ${i.name}\n   (Ref: ${i.pack})\n\n`;
      });
      
      message += `--------------------------\n`;
      message += `*Total Estimated: ${document.getElementById('totalPrice').innerText}*`;
      
      window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
    }
  };

  app.init();
</script>
